<div class="editor-container">
  <div class="toolbar">
    <!-- Import -->
    <div class="menu-container">
      <button (click)="toggleMenu('import')" title="Import">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <span>Import</span>
      </button>
      <div class="dropdown-menu" *ngIf="activeMenu === 'import'">
        <button (click)="fileInput.click()">From File</button>
        <button (click)="importFromClipboard()">From Clipboard</button>
      </div>
    </div>

    <!-- Export -->
    <div class="menu-container">
      <button (click)="toggleMenu('export')" title="Export">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span>Export</span>
      </button>
      <div class="dropdown-menu" *ngIf="activeMenu === 'export'">
        <button (click)="saveToFile()">To File</button>
        <button (click)="exportToClipboard()">To Clipboard</button>
      </div>
    </div>

    <!-- Save Image -->
    <div class="menu-container">
      <button (click)="toggleMenu('image')" title="Save Image">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        <span>Image</span>
      </button>
      <div class="dropdown-menu" *ngIf="activeMenu === 'image'">
        <button (click)="triggerSaveImage()">To File (PNG)</button>
        <button (click)="triggerCopyImage()">To Clipboard</button>
      </div>
    </div>

    <!-- Shuffle -->
    <div class="menu-container">
      <button (click)="shuffle()" title="Shuffle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
        <span>Shuffle</span>
      </button>
    </div>

    <!-- Help -->
    <div class="menu-container help-button-container">
      <button (click)="onShowHelp()" title="Help" class="btn-help">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span>Help</span>
      </button>
    </div>

    <input type="file" #fileInput (change)="importFractal($event)" style="display: none">
  </div>
  
  <h3>Fractal Editor</h3>
  <div class="form-group">
    <label>Fractal Name:</label>
    <input [(ngModel)]="fractal.name" (ngModelChange)="onChange()" title="Name of the fractal">
  </div>

  <div class="row">
    <div class="col">
      <div class="form-group">
        <label>Iterations:</label>
        <input type="number" [(ngModel)]="iterations" (ngModelChange)="onIterationsChange()" min="0" title="Number of recursion levels (Caution: high values can be slow)">
      </div>
    </div>
    <div class="col">
      <div class="form-group">
        <label>Transforms ({{ fractal.transforms.length }}):</label>
        <button (click)="addTransform()" class="btn-add-small" title="Add a new affine transformation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Add
        </button>
      </div>
    </div>
  </div>

  <div class="transforms-list">
    <div *ngFor="let trx of fractal.transforms; let i = index; trackBy: trackByTransform" class="transform-card">
      <div class="transform-header">
        <button (click)="toggleCollapse(i)" class="btn-toggle" [title]="collapsedStates[i] ? 'Expand' : 'Collapse'">{{ collapsedStates[i] ? '+' : '-' }}</button>
        <app-transform-visualizer [transform]="trx" [size]="40" [interactive]="false" title="Preview of this transformation"></app-transform-visualizer>
        <input [(ngModel)]="trx.transformname" (ngModelChange)="onChange()" title="Name of this transformation">
        <button (click)="removeTransform(i)" class="btn-remove" title="Remove this transformation">X</button>
      </div>
      
      <div class="transform-body" *ngIf="!collapsedStates[i]">
        <app-transform-visualizer [transform]="trx" (transformChange)="onChange(i)" title="Drag corners to rotate/scale, center to move"></app-transform-visualizer>
        
        <div class="matrix-grid">
          <div class="matrix-row">
            <input type="number" step="0.01" [(ngModel)]="trx.m00" (ngModelChange)="onMatrixChange(i)" placeholder="m00" title="m00: ScaleX * cos(theta)">
            <input type="number" step="0.01" [(ngModel)]="trx.m01" (ngModelChange)="onMatrixChange(i)" placeholder="m01" title="m01: -ScaleY * sin(theta)">
            <input type="number" step="0.01" [(ngModel)]="trx.m02" (ngModelChange)="onMatrixChange(i)" placeholder="m02" title="m02: TranslateX">
          </div>
          <div class="matrix-row">
            <input type="number" step="0.01" [(ngModel)]="trx.m10" (ngModelChange)="onMatrixChange(i)" placeholder="m10" title="m10: ScaleX * sin(theta)">
            <input type="number" step="0.01" [(ngModel)]="trx.m11" (ngModelChange)="onMatrixChange(i)" placeholder="m11" title="m11: ScaleY * cos(theta)">
            <input type="number" step="0.01" [(ngModel)]="trx.m12" (ngModelChange)="onMatrixChange(i)" placeholder="m12" title="m12: TranslateY">
          </div>
        </div>
      </div>
    </div>
  </div>

  <button (click)="addTransform()" class="btn-add-small" title="Add a new affine transformation to the fractal">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    Add Transformation
  </button>
</div>
